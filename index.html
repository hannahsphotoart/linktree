<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hannah Kittner</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:#fff;
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:390px;
}

/* HERO */
.hero{
  height:230px;
  overflow:hidden;
  border-radius:0 0 28px 28px;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* PROFILE */
.profile{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-top:-70px;
}

.avatar{
  width:120px;
  height:120px;
  border-radius:50%;
  border:6px solid #fff;
  overflow:hidden;
  position:relative;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.badge{
  position:absolute;
  bottom:-4px;
  right:-4px;
  width:34px;
  height:34px;
  background:#fff;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.badge img{
  width:20px;
}

/* NAME */
.name{
  margin-top:14px;
  display:flex;
  align-items:center;
  gap:6px;
}

.name h1{
  font-size:20px;
  font-weight:600;
}

.name img{
  width:18px;
}

/* SUB */
.sub{
  font-size:13px;
  color:#777;
  margin-top:8px; /* MEHR ABSTAND */
}

/* SOCIALS */
.socials{
  display:flex;
  gap:22px;
  margin-top:16px;
}

.socials img{
  width:24px;
}

/* BUTTONS */
.buttons{
  margin-top:24px;
  padding:0 16px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.btn{
  width:100%;
  padding:14px;
  border:1.5px solid #b8a25e;
  border-radius:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  color:#9f8d53;
  font-weight:500;
  text-decoration:none;
}

.btn img{
  width:18px;
}

/* PORTFOLIO */
.portfolio{
  margin:28px 16px;
  border:1.5px solid #b8a25e;
  border-radius:18px;
  padding:16px;
}

.portfolio-title{
  text-align:center;
  color:#9f8d53;
  font-weight:500;
  margin-bottom:12px;
}

/* SLIDER */
.slider{
  display:flex;
  gap:10px;
  overflow-x:auto;
}

.slider img{
  height:140px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- HERO -->
<div class="hero">
  <img src="cover.png">
</div>

<!-- PROFILE -->
<div class="profile">
  <div class="avatar">
    <img src="profile.png">
    <div class="badge">
      <img src="profile-camera-heart.png">
    </div>
  </div>

  <div class="name">
    <h1>Hannah Kittner</h1>
    <img src="verified.png">
  </div>

  <div class="sub">Photographer | Creator | Traveler</div>

  <div class="socials">
    <a href="https://www.instagram.com/hannahs.photoart">
      <img src="instagram.png">
    </a>
    <a href="https://www.tiktok.com/@hannahs.photoart">
      <img src="tiktok.png">
    </a>
    <a href="mailto:hannahkittner.business@gmail.com">
      <img src="telegram.png">
    </a>
  </div>
</div>

<!-- BUTTONS -->
<div class="buttons">
  <a class="btn" href="https://hannahs-photoart.onepage.me/">
    <img src="sparkles.png"> Work with me
  </a>

  <a class="btn" href="https://www.dropbox.com/request/cfdjl8c34cw5rf0dkrlb">
    <img src="upload-icon.png"> Upload your photos
  </a>
</div>

<!-- PORTFOLIO -->
<div class="portfolio">
  <div class="portfolio-title">Portfolio Highlights</div>

  <div class="slider">
    <img src="highlight-1.png">
    <img src="highlight-2.png">
    <img src="highlight-3.png">
    <img src="highlight-4.png">
  </div>
</div>

</div>

</body>
</html>
