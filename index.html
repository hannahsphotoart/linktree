<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hannah Kittner</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:#ffffff;
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:390px;
}

/* HERO */
.hero{
  position:relative;
  height:220px;
  overflow:hidden;
  border-bottom-left-radius:30px;
  border-bottom-right-radius:30px;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.gradient{
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(255,255,255,0.0), rgba(255,255,255,1));
}

/* PROFILE */
.profile{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-top:-70px;
}

.avatar{
  width:120px;
  height:120px;
  border-radius:50%;
  border:6px solid #fff;
  overflow:hidden;
  position:relative;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.badge{
  position:absolute;
  bottom:-5px;
  right:-5px;
  width:34px;
  height:34px;
  background:#fff;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.badge img{
  width:20px;
}

/* NAME */
.name{
  margin-top:12px;
  display:flex;
  align-items:center;
  gap:6px;
}

.name h1{
  font-size:20px;
  font-weight:600;
}

.name img{
  width:18px;
}

/* SUB */
.sub{
  font-size:13px;
  color:#777;
  margin-top:4px;
}

/* SOCIALS */
.socials{
  display:flex;
  gap:22px;
  margin-top:16px;
}

.socials a{
  color:#b8a25e;
  font-size:22px;
  text-decoration:none;
}

/* BUTTONS */
.buttons{
  margin-top:20px;
  padding:0 16px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.btn{
  width:100%;
  padding:14px;
  border:1.5px solid #b8a25e;
  border-radius:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  color:#9f8d53;
  font-weight:500;
  text-decoration:none;
}

/* PORTFOLIO */
.portfolio{
  margin:24px 16px;
  border:1.5px solid #b8a25e;
  border-radius:18px;
  padding:16px;
}

.portfolio-title{
  display:flex;
  justify-content:center;
  gap:8px;
  color:#9f8d53;
  margin-bottom:12px;
}

/* SLIDER */
.slider{
  display:flex;
  gap:10px;
  overflow:hidden;
}

.slider img{
  height:140px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- HERO -->
<div class="hero">
  <img src="cover.jpg">
  <div class="gradient"></div>
</div>

<!-- PROFILE -->
<div class="profile">
  <div class="avatar">
    <img src="profile.jpg">
    <div class="badge">
      <img src="camera-heart.png">
    </div>
  </div>

  <div class="name">
    <h1>Hannah Kittner</h1>
    <img src="verified.png">
  </div>

  <div class="sub">Photographer | Creator | Traveler</div>

  <div class="socials">
    <a href="https://www.instagram.com/hannahs.photoart">◎</a>
    <a href="https://www.tiktok.com/@hannahs.photoart">♪</a>
    <a href="#">✈</a>
  </div>
</div>

<!-- BUTTONS -->
<div class="buttons">
  <a class="btn" href="https://hannahs-photoart.onepage.me/">✨ Work with me</a>
  <a class="btn" href="https://www.dropbox.com/request/cfdjl8c34cw5rf0dkrlb">📤 Upload your photos</a>
  <a class="btn" href="#portfolio">🖼 Portfolio Highlights</a>
</div>

<!-- PORTFOLIO -->
<div id="portfolio" class="portfolio">
  <div class="portfolio-title">🖼 Portfolio Highlights</div>
  <div class="slider">
    <img src="img1.jpg">
    <img src="img2.jpg">
    <img src="img3.jpg">
    <img src="img4.jpg">
  </div>
</div>

</div>

</body>
</html>
